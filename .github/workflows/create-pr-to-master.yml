name: Create PR to master

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "chore/**"

jobs:
  create-pr-to-master:
    name: Create PR to master
    if: github.ref_name != 'master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Create PR if one does not exist
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = 'master';
            const head = `${owner}:${context.ref.replace('refs/heads/', '')}`;

            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base,
              head,
            });

            if (existing.length > 0) {
              core.info(`PR already exists: #${existing[0].number}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              title: `Merge ${context.ref.replace('refs/heads/', '')} into master`,
              head,
              base,
              body: 'Automated PR created by GitHub Actions after successful build.'
            });

            core.info(`Created PR #${pr.number}`);